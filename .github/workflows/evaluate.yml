name: Evaluate bets

on:
  schedule:
    - cron: '0 6 * * 5'  # Every Friday at 6am UTC
  workflow_dispatch:

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - name: Call evaluate endpoint
        run: |
          curl -X POST ${{ secrets.APP_URL }}/api/evaluate \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"