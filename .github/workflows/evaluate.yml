name: Evaluate bets

on:
  schedule:
    - cron: '0 23 * * 4'  # Every Thursday at 11pm UTC (after matches finish)
  workflow_dispatch:

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - name: Call evaluate endpoint
        run: |
          curl -X POST ${{ secrets.APP_URL }}/api/evaluate \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"