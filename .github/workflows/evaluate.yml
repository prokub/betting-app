name: Evaluate bets

on:
  schedule:
    - cron: "0 4 * * 5" # Every Friday at 4am UTC
  workflow_dispatch:

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - name: Call evaluate endpoint
        run: |
          curl -X POST ${{ secrets.APP_URL }}/api/evaluate \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
