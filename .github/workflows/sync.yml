name: Sync matches

on:
  schedule:
    - cron: "0 6 * * 3" # Every Wednesday at 6am UTC
    - cron: "0 16 * * 4" # Every Thursday at 4pm UTC to catch same-day cancellations
  workflow_dispatch: # Also allows manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Call sync endpoint
        run: |
          curl -X POST ${{ secrets.APP_URL }}/api/sync-matches \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
