name: Sync matches

on:
  schedule:
    - cron: "0 14 * * 4" # Every Thursday at 2pm UTC (before tournament start)
  workflow_dispatch: # Also allows manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Call sync endpoint
        run: |
          curl -sf -X POST ${{ secrets.APP_URL }}/api/sync-matches \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
